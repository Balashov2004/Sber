<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430"><rect width="100%" height="100%" fill="#ffffff"/><style>text{font-family:Arial,DejaVu Sans,sans-serif;fill:#18212b}.title{font-size:24px;font-weight:700}.subtitle{font-size:14px;fill:#59636e}.axis{stroke:#9aa4af;stroke-width:1}.grid{stroke:#e6e9ed;stroke-width:1}.label{font-size:12px}.small{font-size:11px}</style><text class="title" x="35" y="40">Доступность НМЦ и итоговой цены контракта</text><text class="subtitle" x="35" y="64">Контрактный слой требует отдельного извлечения протоколов</text><text class="label" x="35" y="145">Есть начальная сумма</text><rect x="250" y="120" width="501.8" height="34" fill="#16a34a"/><text x="761.8" y="143">1180 / 1458</text><text class="label" x="35" y="235">Есть итоговая цена контракта</text><rect x="250" y="210" width="2" height="34" fill="#dc2626"/><text x="265" y="233">0 / 1458</text><text x="35" y="330">Экономию НМЦ → контракт пока нельзя рассчитать достоверно.</text></svg>