<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430"><rect width="100%" height="100%" fill="#ffffff"/><style>text{font-family:Arial,sans-serif;fill:#18212b}.title{font-size:24px;font-weight:700}.subtitle{font-size:13px;fill:#59636e}.axis{stroke:#aab3bd;stroke-width:1}.grid{stroke:#e6e9ed;stroke-width:1}.label{font-size:12px}.value{font-size:11px}</style><text class="title" x="35" y="38">Доступность данных НМЦ и итоговой цены контракта</text><text class="subtitle" x="35" y="62">Итоговая цена отсутствует в текущем слое данных</text><text class="label" x="35" y="145">Указанная начальная сумма</text><rect x="220" y="118" width="526.1" height="38" fill="#16a34a"/><text x="756.1" y="144">1180 / 1458</text><text class="label" x="35" y="235">Итоговая цена контракта</text><rect x="220" y="208" width="2" height="38" fill="#dc2626"/><text x="235" y="234">0 / 1458</text><text x="35" y="325" font-size="15">Распределение экономии НМЦ → контракт нельзя построить достоверно.</text><text x="35" y="352" font-size="15">Нужно извлечь contract_price, winner и protocol_url из протоколов.</text></svg>